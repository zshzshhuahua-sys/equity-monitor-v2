services:
  equity-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: equity-monitor-v2:latest
    container_name: equity-monitor-v2
    ports:
      - "8002:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./secrets:/run/secrets:ro
    environment:
      PYTHONPATH: /app
      PROJECT_ROOT: /app
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: sqlite+aiosqlite:////app/data/equity_monitor.db
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.mail.me.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD_FILE: ${SMTP_PASSWORD_FILE_IN_CONTAINER:-/run/secrets/smtp_password}
      SMTP_RECIPIENTS: ${SMTP_RECIPIENTS:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
